<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fruit Memory Game – 2 Players</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    h1 {
      color: #fff;
      font-size: 2.4rem;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(255, 200, 50, 0.7);
      margin-bottom: 12px;
    }

    .players {
      display: flex;
      gap: 20px;
      margin-bottom: 14px;
      width: 100%;
      max-width: 700px;
      justify-content: center;
    }

    .player-panel {
      flex: 1;
      max-width: 220px;
      border-radius: 16px;
      padding: 12px 20px;
      text-align: center;
      color: #fff;
      border: 3px solid transparent;
      transition: border-color 0.3s, box-shadow 0.3s, transform 0.2s;
      background: rgba(255,255,255,0.07);
    }

    .player-panel.p1 { border-color: #4dabf7; }
    .player-panel.p2 { border-color: #f783ac; }

    .player-panel.active-turn {
      transform: translateY(-4px);
    }
    .player-panel.p1.active-turn {
      box-shadow: 0 0 22px #4dabf7cc;
      background: rgba(77,171,247,0.15);
    }
    .player-panel.p2.active-turn {
      box-shadow: 0 0 22px #f783accc;
      background: rgba(247,131,172,0.15);
    }

    .player-panel .p-name {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      opacity: 0.9;
    }
    .player-panel.p1 .p-name { color: #74c0fc; }
    .player-panel.p2 .p-name { color: #faa2c1; }

    .player-panel .p-score {
      font-size: 2.2rem;
      font-weight: 900;
      line-height: 1.1;
    }
    .player-panel.p1 .p-score { color: #4dabf7; }
    .player-panel.p2 .p-score { color: #f783ac; }

    .player-panel .p-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.6;
    }

    .turn-banner {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 8px;
      padding: 6px 28px;
      border-radius: 30px;
      transition: background 0.3s, color 0.3s;
    }
    .turn-banner.p1 { background: rgba(77,171,247,0.25); color: #74c0fc; }
    .turn-banner.p2 { background: rgba(247,131,172,0.25); color: #faa2c1; }

    .hud {
      display: flex;
      gap: 30px;
      margin-bottom: 14px;
    }

    .hud-box {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 8px 22px;
      text-align: center;
      color: #fff;
    }

    .hud-box .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.7;
    }

    .hud-box .value {
      font-size: 1.6rem;
      font-weight: 700;
      color: #ffd700;
    }

    .btn {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a2e;
      border: none;
      border-radius: 30px;
      padding: 10px 32px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 15px rgba(247, 151, 30, 0.5);
      margin-bottom: 20px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(247, 151, 30, 0.7);
    }

    .btn:active {
      transform: translateY(0);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      max-width: 620px;
      width: 100%;
    }

    .card {
      aspect-ratio: 1;
      perspective: 600px;
      cursor: pointer;
      user-select: none;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 14px;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
    }

    .card-back {
      background: linear-gradient(135deg, #232526, #414345);
      border: 2px solid rgba(255, 255, 255, 0.08);
      font-size: 1.4rem;
      color: rgba(255, 255, 255, 0.15);
    }

    .card-back::after {
      content: '?';
      font-size: 2rem;
      font-weight: 900;
      color: rgba(255, 215, 0, 0.3);
    }

    .card-front {
      transform: rotateY(180deg);
      border: 2px solid rgba(255, 255, 255, 0.25);
    }

    .card.matched-p1 .card-inner {
      box-shadow: 0 0 0 3px #4dabf7, 0 0 18px #4dabf7aa;
    }
    .card.matched-p2 .card-inner {
      box-shadow: 0 0 0 3px #f783ac, 0 0 18px #f783acaa;
    }

    .card.matched-p1,
    .card.matched-p2 {
      cursor: default;
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 10;
      align-items: center;
      justify-content: center;
    }

    .overlay.active {
      display: flex;
    }

    .win-box {
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      border: 2px solid #ffd700;
      border-radius: 24px;
      padding: 40px 60px;
      text-align: center;
      color: #fff;
      box-shadow: 0 0 60px rgba(255, 215, 0, 0.4);
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }

    .win-box h2 {
      font-size: 2.5rem;
      color: #ffd700;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
    }

    .win-box p {
      font-size: 1.1rem;
      opacity: 0.85;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <h1>🍉 Fruit Memory 🍉</h1>
  <div class="players">
    <div class="player-panel p1 active-turn" id="panel1">
      <div class="p-name">🔵 Player 1</div>
      <div class="p-score" id="score1">0</div>
      <div class="p-label">pairs</div>
    </div>
    <div class="player-panel p2" id="panel2">
      <div class="p-name">🩷 Player 2</div>
      <div class="p-score" id="score2">0</div>
      <div class="p-label">pairs</div>
    </div>
  </div>
  <div class="turn-banner p1" id="turnBanner">Player 1's Turn</div>
  <div class="hud">
    <div class="hud-box"><div class="label">Moves</div><div class="value" id="moves">0</div></div>
    <div class="hud-box"><div class="label">Pairs left</div><div class="value" id="matches">18</div></div>
    <div class="hud-box"><div class="label">Time</div><div class="value" id="timer">0s</div></div>
  </div>
  <button class="btn" id="restartBtn">New Game</button>
  <div class="board" id="board"></div>
  <div class="overlay" id="overlay">
    <div class="win-box">
      <h2 id="winTitle">🎉 Game Over!</h2>
      <p id="winStats"></p>
      <button class="btn" id="playAgainBtn">Play Again</button>
    </div>
  </div>
  <script>
    const FRUITS = [{emoji:'🍎',color:'#ff6b6b',bg:'#3d0000'},{emoji:'🍊',color:'#ffa94d',bg:'#3d1a00'},{emoji:'🥭',color:'#ffd43b',bg:'#2d2200'},{emoji:'🍌',color:'#f7f7a0',bg:'#2a2700'},{emoji:'🍇',color:'#cc5de8',bg:'#280038'},{emoji:'🍓',color:'#ff8787',bg:'#3d0015'},{emoji:'🍉',color:'#69db7c',bg:'#003d12'},{emoji:'🍍',color:'#e9c46a',bg:'#2d1f00'},{emoji:'🍑',color:'#ffb8b8',bg:'#3d1500'},{emoji:'🍒',color:'#f03e3e',bg:'#3d0000'},{emoji:'🍋',color:'#fff176',bg:'#2a2700'},{emoji:'🍐',color:'#a9e34b',bg:'#1a2d00'},{emoji:'🥝',color:'#74c869',bg:'#072a00'},{emoji:'🥥',color:'#d4a96a',bg:'#2a1500'},{emoji:'🫐',color:'#748ffc',bg:'#00083d'},{emoji:'🍈',color:'#63e6be',bg:'#003d28'},{emoji:'🥑',color:'#94d82d',bg:'#152600'},{emoji:'🍅',color:'#ff6348',bg:'#3d1000'}];
    let firstCard=null,secondCard=null,locked=false,moves=0,matchCount=0,startTime=null,timerInterval=null,currentPlayer=0;
    const scores=[0,0],PLAYER_NAMES=['Player 1','Player 2'],PANEL_CLASSES=['p1','p2'],MATCH_CLASSES=['matched-p1','matched-p2'];
    const boardEl=document.getElementById('board'),movesEl=document.getElementById('moves'),matchesEl=document.getElementById('matches'),timerEl=document.getElementById('timer'),overlay=document.getElementById('overlay'),winStats=document.getElementById('winStats'),winTitle=document.getElementById('winTitle'),turnBanner=document.getElementById('turnBanner'),panel1=document.getElementById('panel1'),panel2=document.getElementById('panel2'),score1El=document.getElementById('score1'),score2El=document.getElementById('score2');
    document.getElementById('restartBtn').addEventListener('click',startGame);
    document.getElementById('playAgainBtn').addEventListener('click',startGame);
    function updateTurnUI(){panel1.classList.toggle('active-turn',currentPlayer===0);panel2.classList.toggle('active-turn',currentPlayer===1);turnBanner.textContent=PLAYER_NAMES[currentPlayer]+"'s Turn";turnBanner.className='turn-banner '+PANEL_CLASSES[currentPlayer];}
    function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
    return b;}
    function startGame(){firstCard=null;secondCard=null;locked=false;moves=0;matchCount=0;scores[0]=0;scores[1]=0;currentPlayer=0;movesEl.textContent='0';matchesEl.textContent='18';timerEl.textContent='0s';score1El.textContent='0';score2El.textContent='0';overlay.classList.remove('active');clearInterval(timerInterval);startTime=null;updateTurnUI();const deck=shuffle([...FRUITS,...FRUITS]);boardEl.innerHTML='';deck.forEach((fruit,i)=>{const card=document.createElement('div');card.className='card';card.dataset.emoji=fruit.emoji;card.innerHTML=`<div class="card-inner"><div class="card-face card-back"></div><div class="card-face card-front" style="background:${fruit.bg}; color:${fruit.color};">${fruit.emoji}</div></div>`;card.addEventListener('click',onCardClick);boardEl.appendChild(card);});}
    function onCardClick(e){const card=e.currentTarget;if(locked||card.classList.contains('flipped')||card.classList.contains('matched-p1')||card.classList.contains('matched-p2'))return;if(!startTime){startTime=Date.now();timerInterval=setInterval(()=>{timerEl.textContent=Math.floor((Date.now()-startTime)/1000)+'s';},500);}
    card.classList.add('flipped');if(!firstCard){firstCard=card;return;}
    secondCard=card;locked=true;moves++;movesEl.textContent=moves;if(firstCard.dataset.emoji===secondCard.dataset.emoji){matchCount++;scores[currentPlayer]++;score1El.textContent=scores[0];score2El.textContent=scores[1];matchesEl.textContent=18-matchCount;firstCard.classList.add(MATCH_CLASSES[currentPlayer]);secondCard.classList.add(MATCH_CLASSES[currentPlayer]);firstCard=null;secondCard=null;locked=false;if(matchCount===18){clearInterval(timerInterval);const elapsed=Math.floor((Date.now()-startTime)/1000);setTimeout(()=>{let title,stats;if(scores[0]>scores[1]){title='🏆 Player 1 Wins!';stats=`Player 1: ${scores[0]} pairs · Player 2: ${scores[1]} pairs — ${moves} moves in ${elapsed}s`;}else if(scores[1]>scores[0]){title='🏆 Player 2 Wins!';stats=`Player 2: ${scores[1]} pairs · Player 1: ${scores[0]} pairs — ${moves} moves in ${elapsed}s`;}else{title="🤝 It's a Tie!";stats=`Both players got ${scores[0]} pairs — ${moves} moves in ${elapsed}s`;}
    winTitle.textContent=title;winStats.textContent=stats;overlay.classList.add('active');},500);}}else{setTimeout(()=>{firstCard.classList.remove('flipped');secondCard.classList.remove('flipped');firstCard=null;secondCard=null;locked=false;currentPlayer=currentPlayer===0?1:0;updateTurnUI();},900);}}
    startGame();
  </script>
</body>
</html>

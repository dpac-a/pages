<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chutes &amp; Ladders</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>🎲 Chutes &amp; Ladders 🎲</h1>
      <p class="subtitle">2-Player Edition</p>
    </header>

    <div id="game-container">
      <!-- Side panel: Player info + Dice -->
      <aside id="side-panel">
        <div class="player-card" id="player1-card">
          <div class="player-avatar">🧑</div>
          <div class="player-info">
            <span class="player-name">Player 1</span>
            <span class="player-token" style="background:#e74c3c;">●</span>
          </div>
          <div class="player-position">Square: <strong id="p1-pos">1</strong></div>
        </div>

        <div class="player-card" id="player2-card">
          <div class="player-avatar">🧒</div>
          <div class="player-info">
            <span class="player-name">Player 2</span>
            <span class="player-token" style="background:#3498db;">●</span>
          </div>
          <div class="player-position">Square: <strong id="p2-pos">1</strong></div>
        </div>

        <div id="dice-area">
          <div id="dice-face">🎲</div>
          <button id="roll-btn">Roll Dice!</button>
          <div id="roll-hint">or press Enter</div>
          <div id="dice-result"></div>
        </div>

        <div id="turn-indicator">
          <span id="turn-text">Player 1's Turn</span>
        </div>

        <div id="event-log">
          <h3>Game Log</h3>
          <ul id="log-list"></ul>
        </div>

        <button id="restart-btn">🔄 New Game</button>
      </aside>

      <!-- The Board -->
      <main id="board-container">
        <canvas id="board-canvas" width="640" height="640"></canvas>
      </main>
    </div>

    <!-- Win overlay -->
    <div id="win-overlay" class="hidden">
      <div id="win-box">
        <div id="win-emoji">🏆</div>
        <h2 id="win-message">Player 1 Wins!</h2>
        <p>Reached square 100!</p>
        <button id="play-again-btn">Play Again</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>

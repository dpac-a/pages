<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candy Land</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-stars"></div>
  <div id="app">
    <header>
      <h1>Candy Land</h1>
      <p class="subtitle">2-Player Color Card Race</p>
    </header>

    <div id="layout">
      <main id="board-wrap">
        <div id="board" aria-label="Candy Land board"></div>
      </main>

      <aside id="side-panel">
        <div id="turn-pill">Player 1's turn</div>

        <div class="players">
          <div class="player-card active" id="p1-card">
            <div class="player-title">Player 1</div>
            <div class="player-meta">Position: <strong id="p1-pos">Start</strong></div>
          </div>
          <div class="player-card" id="p2-card">
            <div class="player-title">Player 2</div>
            <div class="player-meta">Position: <strong id="p2-pos">Start</strong></div>
          </div>
        </div>

        <section id="card-zone">
          <h2>Color Card</h2>
          <div id="card" class="card idle" aria-live="polite">
            <div class="card-inner">
              <div class="card-front">Draw</div>
              <div class="card-back" id="card-back">?</div>
            </div>
          </div>
          <button id="draw-btn">Draw Card</button>
          <p id="hint">Press Space to draw</p>
        </section>

        <section id="log-panel">
          <h3>Game Log</h3>
          <ul id="log-list"></ul>
        </section>

        <button id="restart-btn">New Game</button>
      </aside>
    </div>

    <div id="win-overlay" class="hidden">
      <div id="win-box">
        <div id="winner-text">Player 1 wins!</div>
        <button id="play-again-btn">Play Again</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
